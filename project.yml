name: StickyBoard
options:
  bundleIdPrefix: com.stickyboard
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  StickyBoard:
    type: application
    platform: macOS
    sources:
      - path: StickyBoard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stickyboard.app
        PRODUCT_NAME: StickyBoard
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: StickyBoard/Info.plist
        SWIFT_VERSION: "5.9"
        COMBINE_HIDPI_IMAGES: true
